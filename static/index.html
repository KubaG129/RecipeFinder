<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RecipeFinder Chat</title>
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <main class="app-shell">
        <section id="auth-view" class="auth-panel" aria-label="Logowanie do RecipeFinder">
            <div class="brand-block">
                <p class="eyebrow">RecipeFinder</p>
                <h1>AI szef kuchni</h1>
                <p class="muted">Zaloguj się, żeby zapisać własną historię rozmów.</p>
            </div>

            <form id="auth-form" class="auth-form">
                <label>
                    Nazwa użytkownika
                    <input id="username-input" type="text" autocomplete="username" required minlength="3">
                </label>
                <label>
                    Hasło
                    <input id="password-input" type="password" autocomplete="current-password" required minlength="6">
                </label>

                <p id="auth-error" class="error-text" hidden></p>

                <div class="auth-actions">
                    <button id="login-button" class="primary-button" type="submit">Zaloguj</button>
                    <button id="register-button" class="secondary-button" type="button">Zarejestruj</button>
                </div>
            </form>
        </section>

        <section id="chat-view" class="workspace" aria-label="RecipeFinder" hidden>
            <aside class="history-panel" aria-label="Historia rozmów">
                <div class="history-header">
                    <div>
                        <p class="eyebrow">Historia</p>
                        <h2>Rozmowy</h2>
                    </div>
                    <button id="new-chat-button" class="small-button" type="button">Nowa</button>
                </div>
                <div id="conversation-list" class="conversation-list"></div>
            </aside>

            <section class="chat-panel" aria-label="Czat z RecipeFinder">
                <header class="chat-header">
                    <div>
                        <p class="eyebrow">RecipeFinder</p>
                        <h1 id="chat-title">AI szef kuchni</h1>
                    </div>
                    <div class="header-actions">
                        <span id="current-user" class="status-pill"></span>
                        <button id="logout-button" class="secondary-button" type="button">Wyloguj</button>
                    </div>
                </header>

                <div id="messages" class="messages" aria-live="polite"></div>

                <form id="chat-form" class="composer">
                    <input id="file-input" type="file" name="plik" accept="image/*" hidden>
                    <button id="attach-button" class="icon-button" type="button" title="Dodaj zdjęcie" aria-label="Dodaj zdjęcie">
                        <svg aria-hidden="true" viewBox="0 0 24 24">
                            <path d="M21.4 11.6 12 21a6 6 0 0 1-8.5-8.5l9.8-9.8a4 4 0 0 1 5.7 5.7l-9.8 9.8a2 2 0 0 1-2.8-2.8l9.4-9.4"/>
                        </svg>
                    </button>

                    <div class="input-stack">
                        <textarea
                            id="message-input"
                            name="wiadomosc"
                            rows="1"
                            placeholder="Napisz wiadomość..."
                            autocomplete="off"
                        ></textarea>
                        <div id="file-preview" class="file-preview" hidden></div>
                    </div>

                    <button id="send-button" class="send-button" type="submit">Wyślij</button>
                </form>
            </section>
        </section>
    </main>

    <script src="/static/app.js"></script>
</body>
</html>
